
name: TechStore CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla (Checkout)
      uses: actions/checkout@v4

    - name: Python Ortamını Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov

    - name: Testleri Çalıştır (PyTest)
      run: |
        python -m pytest --cov=app tests/test_app.py --cov-report=term-missing

    - name: Docker Desktop Kurulumu ve Build Testi
      uses: docker/setup-buildx-action@v3

    - name: Docker İmajını Oluştur (Build)
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: techstore:latest